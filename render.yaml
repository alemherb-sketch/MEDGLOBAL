services:
  - type: web
    name: medglobal-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: DATABASE_URL
        fromDatabase:
          name: medglobal-db
          property: connectionString

  - type: web
    name: medglobal-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: medglobal-backend
          property: host

databases:
  - name: medglobal-db
    databaseName: medglobal
    user: medglobal
